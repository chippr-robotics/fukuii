# Barad-dur Sepolia — ETH Testnet (Engine API validation)
include "conf/base/fukuii.conf"
include "conf/base/pekko.conf"
include "conf/base/logging.conf"

logging.logs-level = "INFO"
pekko.loglevel = "INFO"
pekko.log-dead-letters = 0

fukuii {
  datadir = "/app/data"
  client-identity = "barad-dur-sepolia"

  blockchains {
    network = "sepolia"
  }

  sync {
    # SNAP first — get state up to a recent pivot from peers (Sepolia has many
    # snapshot-bearing geth/besu/nethermind nodes). After SNAP finishes, the CL
    # drives ongoing block import via Engine API (newPayload + forkchoice).
    do-fast-sync = true
    do-snap-sync = true

    # Sepolia has a healthy peer pool, but we keep this loose so a single SNAP-capable
    # peer is enough to bootstrap a pivot — header-validation catches a bad pivot
    # at execution time. Same approach used on ETC mainnet.
    min-peers-to-choose-pivot-block = 1
    use-bootstrap-checkpoints = true

    peer-response-timeout = 90.seconds
    blacklist-duration = 60.seconds
    critical-blacklist-duration = 30.minutes

    snap-sync {
      pivot-block-offset = 0
      max-pivot-staleness-blocks = 4096
      request-timeout = 60.seconds
      min-snap-peers = 3
      snap-peer-eviction-interval = 10s
      max-evictions-per-cycle = 5
    }
  }

  network {
    server-address {
      interface = "0.0.0.0"
      port = 30306
    }

    discovery {
      discovery-enabled = true
      host = "23.122.124.251"
      interface = "0.0.0.0"
      port = 30306
    }

    rpc {
      http {
        enabled = true
        interface = "0.0.0.0"
        port = 8545
        cors-allowed-origins = []
        rate-limit {
          enabled = false
        }
      }
      ipc {
        enabled = false
      }
      apis = "eth,web3,net,personal,fukuii,debug,qa"
    }

    # Engine API — consensus layer interface
    engine-api {
      enabled = true
      interface = "0.0.0.0"
      port = 8551
      jwt-secret-path = "/app/jwt/jwt.hex"
    }

    peer {
      update-nodes-interval = 5.seconds
      min-prune-age = 5.minutes
      short-blacklist-duration = 2.minutes
      long-blacklist-duration = 30.minutes
    }
  }

  mining {
    mining-enabled = false
    coinbase = "0000000000000000000000000000000000000000"
    # Engine API protocol — post-merge, no PoW
    protocol = "engine-api"
    header-extra-data = "fukuii-sepolia"
  }

  metrics {
    enabled = true
    port = 9095
  }
}

# Override logback for Engine API visibility
logging.custom-loggers {
  "com.chipprbots.ethereum.consensus.engine" = "INFO"
}
