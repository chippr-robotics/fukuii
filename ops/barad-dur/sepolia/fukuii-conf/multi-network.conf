# Multi-Network Fukuii Runtime Configuration
# Runs Mordor + Sepolia in a single JVM process
# Memory-conscious: 2GB per instance (4GB total)
#
# Mordor: ETC testnet, fast sync, PoW
# Sepolia: ETH testnet, Engine API, Lighthouse CL

include "conf/base/fukuii.conf"
include "conf/base/pekko.conf"
include "conf/base/logging.conf"

logging.logs-level = "INFO"
pekko.loglevel = "INFO"
pekko.log-dead-letters = 0

fukuii-runtime {
  instances {

    mordor {
      include "conf/base/fukuii.conf"
      include "conf/base/pekko.conf"

      fukuii {
        datadir = "/app/data/mordor"
        client-identity = "fukuii-multi-mordor"

        blockchains {
          network = "mordor"
        }

        sync {
          do-fast-sync = true
          do-snap-sync = false
          min-peers-to-choose-pivot-block = 1
          peers-to-choose-pivot-block-margin = 0
        }

        network {
          server-address {
            interface = "0.0.0.0"
            port = 30304
          }
          discovery {
            discovery-enabled = true
            host = "23.122.124.251"
            interface = "0.0.0.0"
            port = 30304
          }
          rpc {
            http {
              enabled = true
              interface = "0.0.0.0"
              port = 8547
            }
            ipc { enabled = false }
            apis = "eth,web3,net,personal,fukuii,debug,qa"
          }
        }

        mining {
          mining-enabled = false
          protocol = "pow"
        }

        metrics {
          enabled = true
          port = 9096
        }

        db.rocksdb.path = "/app/data/mordor/rocksdb"
      }
    }

    sepolia {
      include "conf/base/fukuii.conf"
      include "conf/base/pekko.conf"

      fukuii {
        datadir = "/app/data/sepolia"
        client-identity = "fukuii-multi-sepolia"

        blockchains {
          network = "sepolia"
        }

        sync {
          do-fast-sync = false
          do-snap-sync = false
        }

        network {
          server-address {
            interface = "0.0.0.0"
            port = 30306
          }
          discovery {
            discovery-enabled = true
            host = "23.122.124.251"
            interface = "0.0.0.0"
            port = 30306
          }
          rpc {
            http {
              enabled = true
              interface = "0.0.0.0"
              port = 8545
            }
            ipc { enabled = false }
            apis = "eth,web3,net,personal,fukuii,debug,qa"
          }
          engine-api {
            enabled = true
            interface = "0.0.0.0"
            port = 8551
            jwt-secret-path = "/app/jwt/jwt.hex"
          }
        }

        mining {
          mining-enabled = false
          protocol = "engine-api"
        }

        metrics {
          enabled = true
          port = 9095
        }

        db.rocksdb.path = "/app/data/sepolia/rocksdb"
      }
    }

  }
}
