# Barad-dur Primary — ETC Mainnet
include "conf/base/fukuii.conf"
include "conf/base/pekko.conf"
include "conf/base/logging.conf"

logging.logs-level = "INFO"
pekko.loglevel = "INFO"
pekko.log-dead-letters = 0

fukuii {
  datadir = "/app/data"
  client-identity = "barad-dur"

  blockchains {
    network = "etc"
  }

  sync {
    do-fast-sync = true
    do-snap-sync = true
    # ETC peer pool is intermittent on this host (firewall + Docker bridge interactions).
    # Lower the pivot-consensus threshold from 3 → 1 so a single ETC peer is enough to
    # bootstrap a pivot; PoW header validation catches a bad pivot at execution time.
    min-peers-to-choose-pivot-block = 1
    use-bootstrap-checkpoints = true
    peer-response-timeout = 90.seconds
    blacklist-duration = 60.seconds
    critical-blacklist-duration = 30.minutes

    snap-sync {
      # Phase 2 SNAP rewrite — streaming MPT construction via StackTrie.
      # Eliminates the multi-GiB in-memory pivot trie and the multi-minute
      # flush. ETC mainnet is the speed-comparison benchmark vs. the prior
      # deferred-merkleization run on the same harness.
      use-stack-trie = true

      # Pivot at network tip (offset=0) maximises the SNAP serve window.
      # Proactive refresh fires at 120-block drift well before the 128-block
      # cliff where peers stop serving the chosen state.
      pivot-block-offset = 0

      max-pivot-staleness-blocks = 4096
      request-timeout = 60.seconds
      # ETC mainnet realistically has only ~2 snap servers. Targeting 3 made eviction fire
      # every cycle forever ("Too many peers" churn) without ever reaching the target. The
      # in-code fruitless-eviction backoff caps this regardless, but a realistic target is cleaner.
      min-snap-peers = 2
      snap-peer-eviction-interval = 10s
      max-evictions-per-cycle = 5
      # Peer-scarce huge-state tolerance: a single account range legitimately takes minutes to
      # advance through a churning 2-peer pool. 180s avoids mistaking slow-but-progressing for a
      # stall (paired with the eligible-set floor + pool-size cooldown peer-retention fixes).
      account-stagnation-timeout = 180.seconds
    }
  }

  network {
    server-address {
      interface = "0.0.0.0"
      # Bind TCP P2P on the same port we advertise externally (30303). Earlier this was
      # 9076 with a Docker port translation `30303:9076/tcp`, but the ENR records what we
      # bind to, not what Docker maps — so peers received "tcp=9076" and the firewall
      # (which only forwards 30300–30310) dropped them. Now ENR=30303 matches forwarding.
      port = 30303
    }

    discovery {
      discovery-enabled = true
      host = "23.122.124.251"
      interface = "0.0.0.0"
      port = 30303
      scan-interval = 10.seconds
    }

    rpc {
      http {
        enabled = true
        interface = "0.0.0.0"
        port = 8545
        cors-allowed-origins = []
        rate-limit {
          enabled = false
        }
      }
      ipc {
        enabled = false
      }
      apis = "eth,web3,net,personal,fukuii,debug,qa"
    }

    peer {
      update-nodes-interval = 5.seconds
      min-prune-age = 5.minutes
      short-blacklist-duration = 2.minutes
      long-blacklist-duration = 30.minutes
    }
  }

  mining {
    mining-enabled = false
    coinbase = "0011223344556677889900112233445566778899"
    protocol = "pow"
    header-extra-data = "fukuii-barad-dur"
  }

  metrics {
    enabled = true
    port = 9095
  }
}
