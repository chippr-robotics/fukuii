# Barad-dur Primary — ETC Mainnet
include "conf/base/fukuii.conf"
include "conf/base/pekko.conf"
include "conf/base/logging.conf"

logging.logs-level = "INFO"
pekko.loglevel = "INFO"
pekko.log-dead-letters = 0

fukuii {
  datadir = "/app/data"
  client-identity = "barad-dur"
  blockchains { network = "etc" }
  sync {
    do-fast-sync = true
    do-snap-sync = true
    peer-response-timeout = 90.seconds
    blacklist-duration = 60.seconds
    critical-blacklist-duration = 30.minutes
    snap-sync {
      pivot-block-offset = 0
      max-pivot-staleness-blocks = 4096
      request-timeout = 60.seconds
      min-snap-peers = 3
      snap-peer-eviction-interval = 10s
      max-evictions-per-cycle = 5
    }
  }
  network {
    server-address { interface = "0.0.0.0"; port = 9076 }
    discovery { discovery-enabled = true; host = "23.122.124.251"; interface = "0.0.0.0"; port = 30303; scan-interval = 10.seconds }
    rpc { http { enabled = true; interface = "0.0.0.0"; port = 8546; cors-allowed-origins = []; rate-limit { enabled = false } }; ipc { enabled = false }; apis = "eth,web3,net,personal,fukuii,debug,qa" }
    peer { update-nodes-interval = 5.seconds; min-prune-age = 5.minutes; short-blacklist-duration = 2.minutes; long-blacklist-duration = 30.minutes }
  }
  mining { mining-enabled = false; coinbase = "0011223344556677889900112233445566778899"; protocol = "pow"; header-extra-data = "fukuii-barad-dur" }
  metrics { enabled = true; port = 9095 }
}
