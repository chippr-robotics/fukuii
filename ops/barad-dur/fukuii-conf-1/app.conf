# Fukuii Configuration for Barad-dûr (Kong API Gateway) Setup
# This configuration optimizes Fukuii to work behind Kong's load balancer

include "base.conf"

fukuii {
  # Network selection (etc, eth, mordor)
  blockchains.network = "mordor"

  # Data directory
  datadir = "/app/data"

  network {
    # Server address for P2P connections
    server-address {
      # Listen on all interfaces
      interface = "0.0.0.0"
      port = 9076
    }

    # RPC configuration - Kong will proxy to these endpoints
    rpc {
      http {
        # Enable HTTP JSON-RPC
        enabled = true
        
        # Listen on all interfaces (Kong proxies to this)
        interface = "0.0.0.0"
        port = 8546
        
        # CORS is handled by Kong, so we can disable it here
        cors-allowed-origins = []
        
        # Rate limiting is handled by Kong
        rate-limit {
          enabled = false
        }
      }

      # IPC endpoint (optional)
      ipc {
        enabled = false
      }

      # Enable all APIs - Kong will manage access control
      apis = "eth,web3,net,personal,fukuii,debug,qa"
    }

    # Discovery configuration
    discovery {
      discovery-enabled = true
      interface = "0.0.0.0"
      port = 30303
      reuse-known-nodes = true

      # Faster discovery iteration (matches cirith-ungol harness)
      scan-interval = 10.seconds
    }

    peer {
      # Keep reduced blacklist durations from cirith-ungol harness
      short-blacklist-duration = 2.minutes
      long-blacklist-duration = 30.minutes
    }
  }

  # Metrics for Prometheus
  metrics {
    enabled = true
    port = 9095
  }

  # Sync configuration
  sync {
    # Enable fast sync as fallback if SNAP sync fails
    do-fast-sync = true

    # Enable SNAP sync (takes priority over fast-sync if enabled)
    do-snap-sync = true

    # Keep extended timeouts from cirith-ungol harness
    peer-response-timeout = 90.seconds

    # Keep reduced blacklist durations from cirith-ungol harness
    blacklist-duration = 60.seconds
    critical-blacklist-duration = 30.minutes

    # snap-sync config is in base.conf with all optimizations
    # (128 batch size, 1MB response, deferred merkleization, peer eviction)
    # Only override here if needed for mainnet-specific tuning.

    check-for-new-block-interval = 10.seconds
  }

  # Transaction pool
  txPool {
    tx-pool-size = 4096
    pending-tx-manager-query-timeout = 30.seconds
    transaction-timeout = 5.minutes
  }

  # Database configuration — RocksDB tuning is in base.conf (fukuii.db.rocksdb)
  # No overrides needed here; base.conf has 4 threads, 512MB cache, etc.

  # Pruning configuration (for production nodes)
  pruning {
    mode = "archive"
  }

  # Logging
  logging {
    logs-level = "INFO"
    json-output = true
    logs-file = null
  }
}

# Pekko (Actor system) configuration
pekko {
  loglevel = "INFO"
  stdout-loglevel = "INFO"

  # Dead-letter logging is noisy at INFO during sync
  log-dead-letters = 0
  
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  
  actor {
    default-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 2.0
        parallelism-max = 16
      }
      
      throughput = 100
    }
  }
}
