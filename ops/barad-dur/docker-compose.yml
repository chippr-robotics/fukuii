# Barad-dûr: Docker Compose file for Kong API Gateway with Fukuii
# Named after Sauron's Dark Tower - the fortified gateway to Fukuii
# Compose file format: https://docs.docker.com/compose/compose-file/

networks:
  fukuii-network:
    driver: bridge
    # IPv6 disabled — the ULA subnet (fd00::/8) is not globally routable, and having
    # a default IPv6 route inside the container caused intermittent outbound failures
    # on the IPv4 P2P paths. Without this, peer discovery dials succeeded ~0% of the
    # time on ETC mainnet despite the host being able to reach the same destinations.
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.21.0.0/16

services:
  # PostgreSQL database for Kong (replaces deprecated Cassandra support)
  postgres:
    image: postgres:16-alpine
    container_name: fukuii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kong}
      POSTGRES_DB: ${POSTGRES_DB:-kong}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    networks:
      - fukuii-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kong}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Kong database migration
  kong-migrations:
    image: kong:3.9
    container_name: fukuii-kong-migrations
    command: kong migrations bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: ${POSTGRES_USER:-kong}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-kong}
      KONG_PG_DATABASE: ${POSTGRES_DB:-kong}
    networks:
      - fukuii-network
    restart: on-failure

  # Kong API Gateway
  kong:
    image: kong:3.9
    container_name: fukuii-kong
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      # Database configuration (PostgreSQL)
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: ${POSTGRES_USER:-kong}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-kong}
      KONG_PG_DATABASE: ${POSTGRES_DB:-kong}
      
      # Proxy configuration
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      
      # Admin API configuration
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      
      # Proxy listeners
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      
      # Declarative configuration
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      
      # Plugins
      KONG_PLUGINS: bundled,prometheus
      
      # Logging
      KONG_LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${KONG_PROXY_HTTP_PORT:-8000}:8000"   # Kong proxy HTTP
      - "${KONG_PROXY_HTTPS_PORT:-8443}:8443" # Kong proxy HTTPS
      - "${KONG_ADMIN_HTTP_PORT:-8001}:8001"   # Kong Admin API HTTP
      - "${KONG_ADMIN_HTTPS_PORT:-8444}:8444" # Kong Admin API HTTPS
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    networks:
      - fukuii-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Fukuii Ethereum Client - Primary Instance
  fukuii-primary:
    image: ${FUKUII_IMAGE:-chipprbots/fukuii:latest}
    container_name: fukuii-primary
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    ports:
      - "${FUKUII_PRIMARY_RPC_PORT:-8545}:8545"       # JSON-RPC HTTP (internal)
      - "${FUKUII_PRIMARY_WS_PORT:-8546}:8546"         # JSON-RPC WebSocket (internal)
      # P2P/TCP and Discovery/UDP both on 30303 — must match server-address.port in
      # etc.conf because the ENR advertises what the container binds to.
      - "${FUKUII_PRIMARY_P2P_PORT:-30303}:30303/tcp"
      - "${FUKUII_PRIMARY_DISCOVERY_PORT:-30303}:30303/udp"
      - "${FUKUII_PRIMARY_METRICS_PORT:-9095}:9095"   # Metrics
    volumes:
      - ${FUKUII_DATA_DIR:-./data/fukuii}:/app/data
      - ./fukuii-conf-1:/app/conf:ro
    # Override the image entrypoint (`java -jar <jar>`) — that puts -jar
    # before any flags we add via `command`, which makes the JVM treat all
    # our -X / -D flags as program args. We need JVM args BEFORE -jar, so
    # invoke `java` directly here.
    entrypoint: ["java"]
    # JVM args aligned with PR #1244 sepolia standard: 3g heap, 1M thread stacks,
    # capped direct memory, fail-fast on OOM. Previous config (-Xmx6g -Xss10M with
    # no direct-mem cap) burned 7.4/8 GiB cgroup with no headroom — Netty buffer
    # spike or peer-pool growth would trigger cgroup OOM. 76 threads × 10M = 760 MiB
    # of stacks alone was needless waste.
    command:
      - "-Xmx3g"
      - "-Xms1g"
      - "-Xss1M"
      - "-XX:MaxDirectMemorySize=512M"
      - "-XX:+UseG1GC"
      - "-XX:MaxGCPauseMillis=200"
      - "-XX:+HeapDumpOnOutOfMemoryError"
      - "-XX:HeapDumpPath=/app/data/logs/heapdump.hprof"
      - "-XX:+ExitOnOutOfMemoryError"
      - "-Dconfig.file=/app/conf/etc.conf"
      - "-Dfukuii.datadir=/app/data"
      - "-jar"
      - "/app/fukuii/lib/fukuii-assembly.jar"
      - "etc"
    networks:
      - fukuii-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Fukuii Ethereum Client - Secondary Instance — Mordor Testnet
  fukuii-secondary:
    image: ${FUKUII_IMAGE:-chipprbots/fukuii:latest}
    container_name: fukuii-secondary
    restart: unless-stopped
    ports:
      # Secondary's mordor.conf binds HTTP RPC on container:8546 (not 8545
      # like the primary), so the host->container map skips 8545 entirely.
      - "${FUKUII_SECONDARY_RPC_PORT:-8547}:8546"
      - "${FUKUII_SECONDARY_P2P_PORT:-30304}:30304/tcp"
      - "${FUKUII_SECONDARY_DISCOVERY_PORT:-30304}:30304/udp"
      - "${FUKUII_SECONDARY_METRICS_PORT:-9096}:9095"
    volumes:
      - ${FUKUII_SECONDARY_DATA_DIR:-./data/fukuii-secondary}:/app/data
      - ./fukuii-conf-2:/app/conf:ro
    # See fukuii-primary for the entrypoint-override rationale.
    # JVM args aligned with PR #1244 standard — 1M stacks, capped direct mem,
    # fail-fast on OOM. Was -Xss10M with no direct-mem cap; same risk profile
    # as primary's old config.
    entrypoint: ["java"]
    command:
      - "-Xmx3g"
      - "-Xms1g"
      - "-Xss1M"
      - "-XX:MaxDirectMemorySize=512M"
      - "-XX:+UseG1GC"
      - "-XX:MaxGCPauseMillis=200"
      - "-XX:+HeapDumpOnOutOfMemoryError"
      - "-XX:HeapDumpPath=/app/data/logs/heapdump.hprof"
      - "-XX:+ExitOnOutOfMemoryError"
      - "-Dconfig.file=/app/conf/mordor.conf"
      - "-Dfukuii.datadir=/app/data"
      - "-jar"
      - "/app/fukuii/lib/fukuii-assembly.jar"
      - "mordor"
    networks:
      - fukuii-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8546/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fukuii-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_DATA_DIR:-./data/prometheus}:/prometheus
    networks:
      - fukuii-network
    depends_on:
      - fukuii-primary
      # - fukuii-secondary  # DISABLED: single node mode
      - kong
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.2
    container_name: fukuii-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-fukuii_grafana_admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ${GRAFANA_DATA_DIR:-./data/grafana}:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - fukuii-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
