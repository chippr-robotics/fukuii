apiVersion: 1

providers:
  - name: 'Fukuii Dashboards'
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      # Derive Grafana folders from the subdirectory each dashboard lives in
      # (ETC Node / Sync / Network / Sepolia Consensus / Archive) instead of one flat "Fukuii" folder.
      foldersFromFilesStructure: true
