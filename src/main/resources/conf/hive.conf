include classpath("application.conf")

fukuii {
  blockchains {
    network = "hive"
  }

  sync {
    do-fast-sync = false
    do-snap-sync = false
  }

  # Archive pruning for chain import — reference count pruning requires
  # onBlockSave() hooks that chain import bypasses
  pruning {
    mode = "archive"
  }
}
