include classpath("application.conf")

fukuii {
  blockchains {
    network = "eth"
  }

  sync {
    # ETH mainnet is post-merge — blocks come via Engine API from the consensus layer.
    do-fast-sync = false
    do-snap-sync = false

    snap-sync {
      # ETH mainnet (post-merge) uses path-scheme trie storage: one node per path slot,
      # enabling inline pruning.
      storage-scheme = "path"
    }
  }
}
