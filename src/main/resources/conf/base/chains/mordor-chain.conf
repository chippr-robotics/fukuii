{
  # Ethereum network identifier:
  # 1 - mainnet, 3 - ropsten, 7 - mordor
  network-id = 7

  # Supported protocol capabilities for peer-to-peer communication
  # eth/63-68: Ethereum wire protocol versions for block/transaction sync
  # snap/1: Snapshot sync protocol for faster initial sync
  capabilities = ["eth/63", "eth/64", "eth/65", "eth/66", "eth/67", "eth/68", "snap/1"]


  # Possibility to set Proof of Work target time for testing purposes.
  # null means that the standard difficulty calculation rules are used
  pow-target-time = null

  # Frontier block number
  frontier-block-number = "0"

  # Homestead fork block number
  # Doc: https://github.com/ethereum/EIPs/blob/master/EIPS/eip-2.md
  homestead-block-number = "0"

  # EIP-106 fork block number
  # Doc: https://github.com/ethereum/EIPs/issues/106
  eip106-block-number = "1000000000000000000"

  # EIP-150 fork block number
  # Doc: https://github.com/ethereum/EIPs/issues/150
  eip150-block-number = "0"

  # EIP-155 fork block number
  # Doc: https://github.com/ethereum/eips/issues/155
  # 3 000 000 following lead of existing clients implementation to maintain compatibility
  # https://github.com/paritytech/parity/blob/b50fb71dd1d29dfde2a6c7e1830447cf30896c31/ethcore/res/ethereum/classic.json#L15
  eip155-block-number = "0"

  # EIP-160 fork block number
  # Doc: https://github.com/ethereum/EIPs/issues/160
  eip160-block-number = "0"

  # EIP-161 fork block number (ETH Only)
  # Doc: https://github.com/ethereum/EIPs/blob/master/EIPS/eip-161.md
  eip161-block-number = "1000000000000000000"

  # EIP-170 max code size (Enabled from Atlantis fork block number)
  # Doc: https://github.com/ethereum/EIPs/issues/170
  # null value indicates there's no max code size for the contract code
  # TODO improve this configuration format as currently it is not obvious that this is enabled only from some block number
  max-code-size = "24576"

  # Difficulty bomb pause block number
  # Doc: https://github.com/ethereumproject/ECIPs/blob/master/ECIPs/ECIP-1010.md
  difficulty-bomb-pause-block-number = "0"

  # Difficulty bomb continuation block number
  # Doc: https://github.com/ethereumproject/ECIPs/blob/master/ECIPs/ECIP-1010.md
  difficulty-bomb-continue-block-number = "0"

  # Difficulty bomb defusion block number
  # Doc: https://github.com/ethereumproject/ECIPs/blob/master/ECIPs/ECIP-1041.md
  difficulty-bomb-removal-block-number = "0"

  # Byzantium fork block number (ETH only)
  # https://github.com/ethereum/EIPs/blob/master/EIPS/eip-609.md
  # NOTE: Mordor is an ETC network; set ETH-only forks to a far-future block to
  # avoid ties (e.g. byzantium=0 vs atlantis=0) that can select the wrong EVM
  # rules when multiple fork heights are equal.
  byzantium-block-number = "1000000000000000000"

  # Atlantis fork block number (ETC only)
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1054
  atlantis-block-number = "0"

  # Agharta fork block number (ETC only)
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1056
  agharta-block-number = "301243"

  # Phoenix fork block number (ETC only)
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1088
  phoenix-block-number = "999983"

  # Constantinople fork block number (ETH only)
  # https://github.com/ethereum/pm/issues/53
  constantinople-block-number = "1000000000000000000"

  # Petersburg fork block number (ETH only)
  # https://github.com/ethereum/EIPs/blob/master/EIPS/eip-1716.md
  petersburg-block-number = "1000000000000000000"

  # Istanbul fork block number (ETH only)
  # https://eips.ethereum.org/EIPS/eip-1679
  istanbul-block-number = "1000000000000000000"

  # ECIP-1112 Treasury Address for Olympia baseFee redirect (ECIP-1111)
  # Olympia treasury contract deployed on Mordor
  treasury-address = "d6165F3aF4281037bce810621F62B43077Fb0e37"

  # Epoch calibration block number
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1099
  ecip1099-block-number = "2520000"

  # Muir Glacier fork block number
  # https://eips.ethereum.org/EIPS/eip-2387
  muir-glacier-block-number = "1000000000000000000"

  # Magneto EVM and Protocol Upgrades
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1103
  magneto-block-number = "3985893"

  # Berlin fork block number (ETH only)
  berlin-block-number = "1000000000000000000"

  # Mystique EVM and Protocol Upgrades (ECIP-1104)
  # Implements EIP-3529: Reduction in refunds
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1104
  # Activated at block 5,520,000 on Jan 13th 2022
  mystique-block-number = "5520000"

  # Spiral EVM and Protocol Upgrades (ECIP-1109)
  # Implements EIP-3855: PUSH0 instruction
  # Implements EIP-3651: Warm COINBASE
  # Implements EIP-3860: Limit and meter initcode
  # Implements EIP-6049: Deprecate SELFDESTRUCT (informational - behavior unchanged)
  # https://ecips.ethereumclassic.org/ECIPs/ecip-1109
  # Activated at block 9,957,000 on Mordor testnet
  spiral-block-number = "9957000"

  # Olympia hard fork block number (ECIP-1111/1112/1121)
  # EIP-1559 baseFee + treasury redirect + 13 execution-layer EIPs
  olympia-block-number = "15800850"

  # DAO fork configuration (Ethereum HF/Classic split)
  # https://blog.ethereum.org/2016/07/20/hard-fork-completed/
  dao = null

  # Starting nonce of an empty account. Some networks (like Morden) use different values.
  account-start-nonce = "0"

  # The ID of the accepted chain
  chain-id = "0x3f"

  # Custom genesis JSON file path
  # null value indicates using default genesis definition that matches the main network
  custom-genesis-file = { include required("mordor-genesis.json") }

  # Monetary policy parameters
  # Doc: https://github.com/ethereumproject/ECIPs/blob/master/ECIPs/ECIP-1017.md
  monetary-policy {
    # Block reward in the first era
    first-era-block-reward = "5000000000000000000"

    # Reduced block reward after Byzantium fork
    # Mordor follows ECIP-1017 era-based reductions (e.g. 5 ETC at block 1, 4 ETC at block 2,000,001).
    # Keep fork-gated reward steps neutral to avoid changing rewards at ETH-only fork heights.
    first-era-reduced-block-reward = "5000000000000000000"

    # Reduced block reward after Constantinople fork
    first-era-constantinople-reduced-block-reward = "5000000000000000000"

    # Monetary policy era duration in number of blocks
    era-duration = 2000000

    # Rate at which rewards get reduced in successive eras.
    # Value in range [0.0, 1.0]
    reward-reduction-rate = 0.2
  }

  # if 2 competing blocktree branches are equal in terms of total difficulty and this is set to true, then gas
  # consumed in those branches will be used to resolve the tie
  # this is currently only used in ETS blockchain tests
  gas-tie-breaker = false

  # if true, account storage will use Ethereum-specific format for storing keys/value in MPT (32 byte)
  # if false, generic storage for arbitrary length integers will be used
  eth-compatible-storage = true

  # Set of initial nodes
  # EIP-1459 DNS-based peer discovery domains
  # Core-geth uses these to dynamically discover Mordor peers via DNS TXT records (ENR tree)
  # The DNS tree is maintained by etclabscore/discv4-dns-lists crawler
  dns-discovery-domains = [
    "all.mordor.blockd.info"
  ]

  # Source: core-geth params/bootnodes_mordor.go (hardcoded) + core-geth live Mordor peers (2026-03-13)
  # These serve as fallback when DNS discovery is unavailable
  bootstrap-nodes = [
    # core-geth hardcoded bootnode (@etccoop-sfo)
    "enode://4539a067ae1f6a7ffac509603ba37baf772fc832880ddc67c53f292b6199fb048267f0311c820bc90bfd39ec663bc6b5256bdf787ec38425c82bde6bc2bcfe3c@24.199.107.164:30303",
    # core-geth live Mordor peers (confirmed chain ID 63, network ID 7)
    "enode://8f70f757eadae401bdd2e229ae03ce04b27293d297215b3ba5cfedc7f1cfea5bf2113bff97ff522e12681774a103937c4f6e9579774549ce6f65a8d97bfa9c11@46.28.240.119:30313",
    "enode://cde434d950e98acf98a57ecc1192ccf99103404da01a7c5951c1e5ed61479b81138b779b7fb7e5f9ef69b805c9cca953794ca445955af860a3f6f0f6fbf49ec1@91.210.101.52:30028",
    "enode://15bc5e5f46d5e04800e6cf5e99f45c719d4274597a1ff20a7114d521ad22ca9b6d60430e58eba938bab7afa62e055edc495a9756ed87bcc824ec0db118d42860@143.198.223.58:30303",
    "enode://e9975d1aa8d6fbe163b56b656832794aabb51d6a60150ff0443493df11b52099f081ac1c4c1a2c27aa2bc8bb87eab17681c3a36c933873db9fad7bc4d1ab88a0@135.181.164.104:40303",
    "enode://e590101c058446616af96e4f5cabc57e6c4466ce1d3d9c148d41beb1356165a6a5dddd53d2711d791e4ce0a1b823781b083283646f07191c0912feb7529aa8a1@79.137.67.110:30304",
    "enode://439a5bf2002809f0be9f9f344f5caedd0b8020118273e2770043a0f4a730579c1e777777e4d8c76fd8caccc8f159626d76c5ae6c37425e7903b7803e4577399e@54.179.25.140:30303",
    "enode://1169e4c40d00140a76d23555da08764c70be38d7d891de48eb5144596286bfbe2bb1a1cab2aeea75c5f42534d0d72d07c9763997bdf3f6dbdeba36a5e45e084b@18.163.117.90:30303",
    "enode://14f75b7f2409246d7705a6ba0aeec5fda0b92a12fcfcaa4a99790672429fb044307629607a8d3016ab2f22a8d732708b18ff8d754a623a9dc23787a235025de2@45.55.85.146:30303",
    "enode://e514276ed4fc09794c88ba261f013c302c521d83ad4e70ab3cc52c2eda314196df9d3aa7a955beefa726d3ccdfecd922bd594dd3c71bff5c510a27266ff5c395@46.101.142.248:30303"
  ]

  # ECIP-1100: MESS (Modified Exponential Subjective Scoring)
  # Anti-reorg protection using cubic polynomial antigravity curve.
  # Reorgs require polynomially higher TD based on time since common ancestor.
  # Deactivated at block 10,400,000.
  mess {
    # Enable MESS scoring (default: false for backward compatibility)
    # Both enabled=true AND block within activation window required for MESS to apply
    enabled = false

    # ECBP-1100 block-based activation window (matching core-geth)
    # MESS only applies to blocks in [activation, deactivation) range
    ecbp1100-block-number = "2380000"
    ecbp1100-deactivate-block-number = "10400000"
  }
}
