{
  # Vanilla Ethereum chain config for hive testing and generic EVM chains.
  # No ETC-specific forks, no DAO fork, no difficulty bomb modifications.
  # All fork block numbers default to Long.MaxValue (disabled) and are
  # overridden by the hive adapter via -D system properties.

  network-id = 1
  chain-id = "0x01"
  network-type = "eth"

  pow-target-time = null

  # Base fork blocks — all disabled by default, overridden by hive env vars
  frontier-block-number = "0"
  homestead-block-number = "1000000000000000000"
  eip106-block-number = "1000000000000000000"
  eip150-block-number = "1000000000000000000"
  eip155-block-number = "1000000000000000000"
  eip160-block-number = "1000000000000000000"
  eip161-block-number = "1000000000000000000"

  max-code-size = "24576"

  # Standard Ethereum difficulty bomb (no ETC pause/continue/removal)
  difficulty-bomb-pause-block-number = "1000000000000000000"
  difficulty-bomb-continue-block-number = "1000000000000000000"
  difficulty-bomb-removal-block-number = "1000000000000000000"

  byzantium-block-number = "1000000000000000000"
  constantinople-block-number = "1000000000000000000"
  petersburg-block-number = "1000000000000000000"
  istanbul-block-number = "1000000000000000000"
  muir-glacier-block-number = "1000000000000000000"
  berlin-block-number = "1000000000000000000"

  # London / EIP-1559 (called "olympia" in fukuii's fork numbering)
  olympia-block-number = "1000000000000000000"

  # ETC-specific forks — all disabled
  atlantis-block-number = "1000000000000000000"
  agharta-block-number = "1000000000000000000"
  phoenix-block-number = "1000000000000000000"
  ecip1099-block-number = "1000000000000000000"
  magneto-block-number = "1000000000000000000"
  mystique-block-number = "1000000000000000000"
  spiral-block-number = "1000000000000000000"

  # No treasury (ETC-only feature)
  treasury-address = "0000000000000000000000000000000000000000"

  # No DAO fork
  dao = null

  account-start-nonce = "0"
  custom-genesis-file = null

  # Standard Ethereum monetary policy (no era-based reduction)
  monetary-policy {
    first-era-block-reward = "5000000000000000000"
    first-era-reduced-block-reward = "3000000000000000000"
    first-era-constantinople-reduced-block-reward = "2000000000000000000"
    era-duration = 2000000000
    reward-reduction-rate = 0
  }

  gas-tie-breaker = false
  eth-compatible-storage = true

  # No bootstrap nodes — hive provides peers via HIVE_BOOTNODE
  bootstrap-nodes = []

  mess {
    enabled = false
  }
}
