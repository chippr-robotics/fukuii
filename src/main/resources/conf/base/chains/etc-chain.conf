  # ECIP-1100: MESS (Modified Exponential Subjective Scoring)
  # Anti-reorg protection using cubic polynomial antigravity curve.
  # Reorgs require polynomially higher TD based on time since common ancestor.
  # Deactivated at Spiral (block 19,250,000).
  mess {
    # Enable MESS scoring (default: false for backward compatibility)
    # Both enabled=true AND block within activation window required for MESS to apply
    enabled = false

    # ECBP-1100 block-based activation window (matching core-geth)
    # MESS only applies to blocks in [activation, deactivation) range
    ecbp1100-block-number = "11380000"
    ecbp1100-deactivate-block-number = "19250000"
  }
}
