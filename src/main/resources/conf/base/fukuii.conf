fukuii {
  # Optionally augment the client ID sent in Hello messages.
  client-identity = null

  # Base directory where all the data used by the node is stored, including blockchain data and private keys
  datadir = ${user.home}"/.fukuii/"${fukuii.blockchains.network}

  # Temporary files directory (SNAP sync contract files, RocksDB JNI .so extraction, JFR profiles).
  # Defaults to <datadir>/tmp to keep temp data on the same volume as the database.
  # Override to place temp files on a different volume (e.g. a dedicated tmpfs mount).
  tmpdir = ${fukuii.datadir}"/tmp"

  # The unencrypted private key of this node
  node-key-file = ${fukuii.datadir}"/node.key"

  # timeout for shutting down the ActorSystem
  shutdown-timeout = "15.seconds"

  # Whether to run Fukuii in test mode (similar to --test flag in cpp-ethereum).
  # When set, test validators and consensus are used by this node.
  # It also enables test_ RPC endpoints.
  testmode = false

  # one of the algorithms defined here:
  # https://docs.oracle.com/javase/8/docs/technotes/guides/security/StandardNames.html#SecureRandom
  # Uncomment this to specify, otherwise use the default implementation
  # secure-random-algo = "NativePRNG"

  include "keystore.conf"
  include "network.conf"
  include "txpool.conf"
  include "mining.conf"
  include "pow.conf" 
  include "blockchains.conf"
  include "sync.conf"
  include "pruning.conf"
  include "node-caching.conf"
  include "inmemory-pruning-node-caching.conf"
  include "db.conf"
  include "filter.conf"
  include "vm.conf"
  include "async.conf"
  include "metrics.conf"

  sync {
    snap {
      healing {
        # How many times a task can be requeued before triggering escalation
        max-requeues-per-task = 20
        # How many consecutive stateless pivot refreshes before entering dormant retry
        max-consecutive-pivot-refreshes = 10
        # Accounts per batch in StateValidator trie walk
        trie-walk-batch-size = 500
        # How often the stagnation watchdog fires (must match healing actor default)
        stagnation-check-interval = 120s
        # Consecutive stagnation cycles before escalating to pivot refresh
        max-consecutive-stagnations = 3
        # Consecutive account-stall pivot refreshes before dormant retry
        max-consecutive-account-stall-refreshes = 10
        # Bootstrap retry limit before fallback to fast sync
        max-bootstrap-retries = 10
        # Validation retry limit before entering dormant or restarting
        max-validation-retries = 3
      }

      dormant-retry {
        # Base wait before retrying after SNAP peer exhaustion (exponential from here)
        base-backoff = 3m
        # Maximum wait (caps exponential growth)
        max-backoff = 20m
        # Verified account progress that resets the critical failure counter
        progress-reset-threshold = 100000
      }
    }
  }
}
