pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]

  # TODO(production): Change to INFO before mainnet release (DEBUG is excessive for production)
  loglevel = "DEBUG"
  loglevel = ${?PEKKO_LOGLEVEL}

  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  logger-startup-timeout = 30s
  log-dead-letters-during-shutdown = off
  log-dead-letters = 5

  coordinated-shutdown.phases {
    actor-system-terminate {
      timeout = 15 s
    }
  }

  actor {
    mailbox {
      requirements {
        "org.apache.pekko.dispatch.BoundedMessageQueueSemantics" = bounded-mailbox
      }
      # Suppress "potentially-blocking mailbox" warning. 0 = non-blocking (fail-fast to dead letters).
      bounded-queue-based.mailbox-push-timeout-time = 0
    }
  }
}

# Bounded mailbox configured for SignedTransactionsFilterActor.
# Actor is resposible for calculating sender for signed transaction which is heavy operation, and when there are many
# peers it can easily overflow
bounded-mailbox {
  mailbox-type = "org.apache.pekko.dispatch.NonBlockingBoundedMailbox"
  mailbox-capacity = 50000
}

# Dedicated dispatcher for sync actors (SNAP/fast/regular) so they don't
# starve the default dispatcher used by the HTTP server and TCP I/O.
sync-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 2.0
    parallelism-max = 16
  }
  throughput = 5
}

# separate threadpool for concurrent header validation
validation-context {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 4
  }
  throughput = 1
}

# Dedicated single-thread dispatcher for SNAP state validation (account- and
# storage-trie walks). These walks take ~28 min on Mordor and multi-hour on
# mainnet; running them on `sync-dispatcher` would tie up a worker for the
# duration. Pinning to a single fixed thread keeps the work isolated and
# guarantees it can't squeeze the rest of the actor system. Caveat: a stuck
# validation monopolises this thread; that's acceptable because a stuck
# `validateAccountTrie` is a correctness bug at the StateValidator layer, and
# the calling actor remains responsive either way.
snap-validation-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 1
  }
  throughput = 1
}

# Dedicated dispatcher for the Engine API HTTP server. CL clients (Lighthouse,
# Prysm, etc.) issue forkchoiceUpdated and newPayload calls every ~12s and time
# out hard at ~8s. Sharing the default dispatcher with peer-management actors
# means a busy P2P session can stall every Engine API call, leaving the CL
# stuck in optimistic mode and the EL effectively offline for staking. Keep
# this isolated.
engine-api-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 1.0
    parallelism-max = 8
  }
  throughput = 5
}

# DEBUGGING SETTING
# Uncomment to enable non-standard mailbox for all actors
# Mailbox will start logging actor path, when actor mailbox size will be bigger than `size-limit`
# Useful when looking for memory leaks caused by unbounded mailboxes
#
