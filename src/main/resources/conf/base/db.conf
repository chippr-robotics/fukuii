 db {
    rocksdb {
      # RocksDB data directory
      path = ${fukuii.datadir}"/rocksdb/"

      # Create DB data directory if it's missing
      create-if-missing = true

      # Should the DB raise an error as soon as it detects an internal corruption
      paranoid-checks = true

      # Compaction parallelism — critical during SNAP sync's write-heavy phase.
      # Each compaction thread can saturate ~100MB/s. With SSD doing 500MB/s, need 4-5 threads.
      # Reference: geth uses 4, erigon uses max(1, numCPU/2), besu uses 4.
      max-threads = 4

      # Max open file descriptors for RocksDB (geth: unlimited, erigon: 512, besu: OS default)
      # 512 avoids FD churn during SNAP sync while staying within ulimit
      max-open-files = 512

      # Checksum verification during reads. During SNAP sync, data is already verified by
      # Merkle proofs, so checksums add overhead. Can be disabled via override during sync.
      verify-checksums = true

      # In this mode, size target of levels are changed dynamically based on size of the last level
      # https://rocksdb.org/blog/2015/07/23/dynamic-level.html
      level-compaction-dynamic-level-bytes = true

      # Block size: 16KB default. Flat slot namespace benefits from 32KB (better compression
      # for sequential key patterns like accountHash++slotHash), but we use a single config
      # for all column families. 16KB is a good compromise.
      block-size = 16384

      # Block cache: 512MB (up from 256MB). During SNAP sync, cache hit rate directly impacts
      # read performance for proof verification and trie lookups. Aligned with erigon/besu.
      block-cache-size = 536870912
    }

    # Define which database to use [rocksdb]
    data-source = "rocksdb"

    # Run database checks every 10 mins and shut down when an inconsistency is found
    periodic-consistency-check = false
  }