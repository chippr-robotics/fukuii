mining {
    # Miner's coinbase address
    # Also used in non-Ethash consensus.
    coinbase = "0011223344556677889900112233445566778899"

    # Extra data to add to mined blocks
    header-extra-data = "fukuii"

    # This determines how many parallel eth_getWork request we can handle, by storing the prepared blocks in a cache,
    # until a corresponding eth_submitWork request is received.
    #
    # Also used by the generic `BlockGenerator`.
    block-cache-size = 30

    # See com.chipprbots.ethereum.consensus.mining.Protocol for the available protocols.
    # Declaring the protocol here means that a more protocol-specific configuration
    # is pulled from the corresponding consensus implementation.
    # For example, in case of ethash, a section named `ethash` is used.
    # Available protocols: pow, mocked, restricted-pow
    # In case of mocked, remember to enable qa api
    protocol = pow

    # Fallback gas limit target for mined blocks when no fork-schedule target applies.
    # The miner will gradually adjust toward this at ±1/1024 per block.
    # On ETC/Mordor, etc-chain.conf and mordor-chain.conf embed spiral-gas-target and
    # olympia-gas-target which override this value — so in practice this default only
    # applies to private chains and ETH networks without a fork gas schedule.
    # Matches core-geth's ETC default (GasCeil = 8M for --classic).
    gas-limit-target = 8000000

    # If true then the consensus protocol uses this node for mining.
    # In the case of ethash PoW, this means mining new blocks, as specified by Ethereum.
    # In the general case, the semantics are due to the specific consensus implementation.
    mining-enabled = false

    # List of HTTP endpoints to POST new work packages to on every new block.
    # core-geth reference: --miner.notify (consensus/ethash/sealer.go notifyWork)
    # Format posted: ["0xSealhash", "0xDagSeed", "0xTarget", "0xBlockNumber"]
    notify-urls = []

    # Number of blocks behind current best that a submitted work solution is still accepted.
    # core-geth reference: staleThreshold = 7 (consensus/ethash/sealer.go)
    stale-threshold = 7

    # Rebuild the candidate block after this interval if new transactions arrive while mining.
    # Set to 0s to disable (core-geth default: 2s via --miner.recommit).
    recommit-interval = "0s"
  }