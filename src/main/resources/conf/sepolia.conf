include classpath("application.conf")

fukuii {
  blockchains {
    network = "sepolia"
  }

  sync {
    # Sepolia is post-merge — blocks come via Engine API from the consensus layer.
    # Peer sync is used only for state/body fetching, not block discovery.
    do-fast-sync = false
    do-snap-sync = false
  }
}
