# Fukuii Multi-Instance Runtime Configuration
# Runs multiple chain instances in a single JVM process.
#
# Usage: fukuii runtime --config conf/multi-instance.conf
#
# Each instance gets its own:
#   - RocksDB database directory
#   - P2P port
#   - JSON-RPC port
#   - Engine API port (if enabled)
#   - Metrics port
#   - ActorSystem

fukuii-runtime {
  instances {

    # ETC Mainnet instance
    etc {
      include classpath("conf/etc.conf")

      fukuii {
        datadir = ${user.home}"/.fukuii/etc"
        network {
          server-address.port = 30303
          discovery.port = 30303
          rpc.http.port = 8545
        }
        metrics.port = 9095
        db.rocksdb.path = ${user.home}"/.fukuii/etc/rocksdb"
      }
    }

    # Mordor Testnet instance
    mordor {
      include classpath("conf/mordor.conf")

      fukuii {
        datadir = ${user.home}"/.fukuii/mordor"
        network {
          server-address.port = 30304
          discovery.port = 30304
          rpc.http.port = 8546
        }
        metrics.port = 9096
        db.rocksdb.path = ${user.home}"/.fukuii/mordor/rocksdb"
      }
    }

  }
}
