include classpath("application.conf")

fukuii {
  blockchains {
    network = "mordor"
  }

  sync {
    # Mordor testnet typically has very few peers (often just 1 bootstrap node).
    # Lower pivot consensus requirements so fast sync can start with a single peer.
    min-peers-to-choose-pivot-block = 1
    peers-to-choose-pivot-block-margin = 0
  }
}
