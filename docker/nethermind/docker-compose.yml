# Docker Compose file for Nethermind with monitoring stack
# ETH reference client for comparison testing against Fukuii

volumes:
    prometheus_data: {}
    grafana_data: {}

networks:
  nethermind-net:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nethermind-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/:/etc/prometheus/
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - nethermind
    networks:
      - nethermind-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.2.2
    container_name: nethermind-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-nethermind}
    networks:
      - nethermind-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nethermind:
    image: nethermind/nethermind:latest
    container_name: nethermind-node
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "30303:30303"
      - "6060:6060"
    networks:
      - nethermind-net
    volumes:
      - ${HOME}/.fukuii/development/nethermind:/nethermind/data
    command:
      - --JsonRpc.Enabled=true
      - --JsonRpc.Host=0.0.0.0
      - --JsonRpc.Port=8545
      - --Metrics.Enabled=true
      - --Metrics.ExposePort=6060
      - --datadir=/nethermind/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
