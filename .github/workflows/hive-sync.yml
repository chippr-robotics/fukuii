name: Hive · sync

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-sync.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-sync.yml'
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      hive_ref:
        description: 'ethereum/hive git ref'
        required: false
        default: 'master'
      sim_timelimit:
        description: 'Per-sim timelimit (e.g. 40m)'
        required: false
        default: '40m'

permissions:
  contents: read

concurrency:
  group: hive-sync-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  run:
    uses: ./.github/workflows/_hive-sim.yml
    with:
      sim: ethereum/sync
      label: sync
      sim_timelimit: ${{ github.event.inputs.sim_timelimit || '40m' }}
      hive_ref: ${{ github.event.inputs.hive_ref || 'master' }}
      # Cross-client sync: each listed client takes a turn as the source and
      # every client (including itself) is tested as a sink against it. With
      # `fukuii,go-ethereum,besu` we get fukuii↔geth and fukuii↔besu interop
      # in addition to the (less informative) fukuii↔fukuii self-test.
      clients: 'fukuii,go-ethereum,besu'
