name: Hive · pyspec

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-pyspec.yml'
  schedule:
    - cron: '40 4 * * *'
  workflow_dispatch:
    inputs:
      hive_ref:
        description: 'ethereum/hive git ref'
        required: false
        default: 'master'
      sim_timelimit:
        description: 'Per-sim timelimit (e.g. 40m)'
        required: false
        default: '60m'

permissions:
  contents: read

concurrency:
  group: hive-pyspec-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  run:
    uses: ./.github/workflows/_hive-sim.yml
    with:
      sim: ethereum/pyspec
      label: pyspec
      sim_timelimit: ${{ github.event.inputs.sim_timelimit || '60m' }}
      hive_ref: ${{ github.event.inputs.hive_ref || 'master' }}
