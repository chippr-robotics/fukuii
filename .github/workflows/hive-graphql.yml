name: Hive · graphql

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-graphql.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-graphql.yml'
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:
    inputs:
      hive_ref:
        description: 'ethereum/hive git ref'
        required: false
        default: 'master'
      sim_timelimit:
        description: 'Per-sim timelimit (e.g. 40m)'
        required: false
        default: '20m'

permissions:
  contents: read

concurrency:
  group: hive-graphql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  run:
    uses: ./.github/workflows/_hive-sim.yml
    with:
      sim: ethereum/graphql
      label: graphql
      # parallelism=1: the graphql suite's `pending` / `sendRawTransaction` tests are
      # order-sensitive. With parallelism>1, test 35 (graphql_pending) races tests 34 /
      # 36 / 38 at the mempool and flakes based on scheduling. Serial execution gives
      # the same deterministic pool view geth sees.
      parallelism: 1
      sim_timelimit: ${{ github.event.inputs.sim_timelimit || '20m' }}
      hive_ref: ${{ github.event.inputs.hive_ref || 'master' }}
