name: Auto Version Increment

on:
  push:
    branches:
      - main
      - master
      - develop
      - staging
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs-*.yml'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:
    inputs:
      increment_type:
        description: 'Version increment type. Major bumps must be run manually.'
        required: true
        type: choice
        default: major
        options:
          - major
          - minor
          - patch

# Prevent duplicate runs when PR is merged (push event is sufficient)
concurrency:
  group: auto-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-version:
    name: Auto Increment Version
    # Guards (2026-06-11, the 0.7.0 promotion postmortem):
    #  - head-commit guard: replaces the old `[skip ci]` in the bump commit message as loop
    #    prevention. `[skip ci]` at a branch HEAD also suppresses ALL pull_request-event
    #    workflows for PRs whose head is that branch, which permanently blocked the
    #    staging->main promotion PR's required checks.
    #  - forced/created guards: a branch reset (force-push) or branch (re)creation is not a
    #    code merge — bumping+tagging+dispatching a release off it minted a spurious v0.7.1
    #    while v0.7.0 was being released.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore: bump version to') &&
       github.event.forced != true &&
       github.event.created != true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # `gh workflow run release.yml` (final step) calls
      # POST /actions/workflows/.../dispatches, which the default
      # GITHUB_TOKEN cannot reach with only `contents: write`. Without
      # this every auto-version run since PR #1118 has died at the
      # dispatch step with `HTTP 403: Resource not accessible by
      # integration`, leaving v0.2.x tags created but no release built.
      actions: write
    outputs:
      version: ${{ steps.new-version.outputs.version }}
      increment_type: ${{ steps.version-type.outputs.increment_type }}
      release_tier: ${{ steps.version-type.outputs.release_tier }}
      version_changed: ${{ steps.commit-version.outputs.version_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version increment type
        id: version-type
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          MANUAL_INCREMENT: ${{ github.event.inputs.increment_type }}
        run: |
          # Increment policy:
          #   staging / develop → patch (0.0.+1)
          #   main / master     → minor (0.+1.0)
          #   workflow_dispatch → caller picks (major / minor / patch)
          # Major bumps are intentionally manual-only — there is no automatic
          # path to a major version on a push, since major changes always
          # warrant a deliberate human decision.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            INC="$MANUAL_INCREMENT"
          elif [ "$REF" = "refs/heads/main" ] || [ "$REF" = "refs/heads/master" ]; then
            INC=minor
          else
            INC=patch
          fi

          # Map increment type to release tier (which controls release.yml's
          # artifact set). minor and major get the full pipeline (Docker +
          # signing + SBOM); patch is JAR/zip only.
          case "$INC" in
            major|minor) TIER=full ;;
            patch)       TIER=patch ;;
            *) echo "::error::Unknown increment type: $INC"; exit 1 ;;
          esac

          echo "increment_type=$INC"  >> "$GITHUB_OUTPUT"
          echo "release_tier=$TIER"   >> "$GITHUB_OUTPUT"
          echo "Branch ref: $REF / event: $EVENT_NAME → increment=$INC, release_tier=$TIER"

      - name: Read current version
        id: current-version
        run: |
          VERSION=$(grep 'ThisBuild / version' version.sbt | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new-version
        env:
          CURRENT: ${{ steps.current-version.outputs.version }}
          INCREMENT_TYPE: ${{ steps.version-type.outputs.increment_type }}
        run: |
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          case "$INCREMENT_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION (was $CURRENT, increment=$INCREMENT_TYPE)"

      - name: Update version.sbt
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"
          sed -i "s/(ThisBuild \/ version) := \"[^\"]*\"/(ThisBuild \/ version) := \"$NEW_VERSION\"/" version.sbt

          echo "Updated version.sbt:"
          cat version.sbt

      - name: Commit and push version update
        id: commit-version
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"

          git add version.sbt

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No version changes to commit"
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # No [skip ci]: it poisons the branch HEAD for pull_request-event workflows (see job
          # guard above). The duplicate-CI cost is avoided by the bump-commit guards in ci.yml /
          # autofix.yml / this workflow instead.
          git commit -m "chore: bump version to $NEW_VERSION"
          git push

          echo "version_changed=true" >> $GITHUB_OUTPUT
          echo "Version bumped to $NEW_VERSION and pushed"

      - name: Create version tag
        if: steps.commit-version.outputs.version_changed == 'true'
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.version }}"

          # Create annotated tag
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          echo "Created and pushed tag v$NEW_VERSION"

      # Dispatch release.yml via the workflows API. We dispatch instead of
      # chaining release.yml as a reusable workflow (`uses:`) because that
      # chain pulled in slsa-github-generator and failed GitHub's startup
      # validation — every auto-version run since 2026-02-19 was a 0-job
      # `startup_failure` until this change. workflow_dispatch is the one
      # event GITHUB_TOKEN can fire that re-enters the Actions runtime, so
      # the dispatched release run is independent of this job's success.
      #
      # Dispatch on the source branch (main/master/develop), NOT on the new
      # tag. release.yml's checkout step pins to `ref: v${{ inputs.version
      # }}` explicitly, so the dispatch ref doesn't affect what gets built —
      # but it DOES decide which branch the run is recorded under, which
      # drives the workflow status badge. Dispatching on the tag (`--ref
      # v${NEW_VERSION}`) hid every successful release from the badge for
      # the default branch, leaving it stuck on stale `startup_failure`
      # entries from before the SLSA fix.
      - name: Dispatch release workflow
        if: steps.commit-version.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new-version.outputs.version }}
          RELEASE_TIER: ${{ steps.version-type.outputs.release_tier }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          gh workflow run release.yml \
            --ref "${SOURCE_REF}" \
            -f "version=${NEW_VERSION}" \
            -f "release_tier=${RELEASE_TIER}"
          echo "Dispatched release.yml on ${SOURCE_REF} for v${NEW_VERSION} (tier=${RELEASE_TIER})"
