name: Dependency Security Check

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - '**/Dependencies.scala'
      - 'project/plugins.sbt'
      - 'build.sbt'
      - 'project/build.properties'

permissions:
  contents: read
  pull-requests: write

jobs:
  owasp-dependency-check:
    name: OWASP CVE Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      # OWASP Dependency-Check scans resolved JARs for known CVEs using the
      # NVD database. It covers all transitive dependencies, not just direct ones.
      - name: Run OWASP Dependency Check
        run: |
          sbt "set ThisBuild / dependencyCheckFailBuildOnCVSS := 7" \
              "dependencyCheck"
        continue-on-error: true  # Upload report even if CVEs found; don't block CI on known/accepted issues

      - name: Upload OWASP report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: owasp-dependency-check-report
          path: |
            target/scala-*/dependency-check-report.html
            target/scala-*/dependency-check-report.xml
          retention-days: 30

      - name: Comment on PR with CVE summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');

            // Parse the XML report for a quick summary
            let summary = '## 🔒 OWASP Dependency Check Results\n\n';

            const xmlFiles = glob.sync('target/**/dependency-check-report.xml');
            if (xmlFiles.length === 0) {
              summary += '⚠️ Report not found — check the workflow logs.\n';
            } else {
              const xml = fs.readFileSync(xmlFiles[0], 'utf8');
              const criticalMatches = (xml.match(/severity>CRITICAL/g) || []).length;
              const highMatches = (xml.match(/severity>HIGH/g) || []).length;
              const mediumMatches = (xml.match(/severity>MEDIUM/g) || []).length;

              if (criticalMatches + highMatches === 0) {
                summary += '✅ No critical or high severity CVEs found in resolved dependencies.\n';
              } else {
                summary += `⚠️ Found **${criticalMatches} critical** and **${highMatches} high** severity CVEs.\n\n`;
                summary += 'Download the full HTML report artifact for details and remediation guidance.\n';
              }
              if (mediumMatches > 0) {
                summary += `\nℹ️ ${mediumMatches} medium severity findings — review at discretion.\n`;
              }
            }

            summary += '\n_Scan powered by [OWASP Dependency-Check](https://jeremylong.github.io/DependencyCheck/)._';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  stale-deps-check:
    name: Stale Dependency Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Check for stale dependencies
        run: |
          sbt dependencyUpdates 2>&1 | tee dep-updates.txt
        continue-on-error: true

      - name: Upload stale deps report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: stale-dependency-report
          path: dep-updates.txt
          retention-days: 30
