name: Hive · consume-engine

# Unfiltered consume-engine sweep (all forks).
# hive-prague.yml and hive-osaka.yml run narrower per-fork sweeps with their
# own pass thresholds; this workflow is the broad cross-fork companion.
# Long-running (~60min); restricted to main-bound PRs + manual dispatch only.

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'build.sbt'
      - 'version.sbt'
      - 'project/**'
      - 'hive/**'
      - '.github/workflows/_hive-sim.yml'
      - '.github/workflows/hive-consume-engine.yml'
  workflow_dispatch:
    inputs:
      hive_ref:
        description: 'ethereum/hive git ref'
        required: false
        default: 'master'
      sim_timelimit:
        description: 'Per-sim timelimit (e.g. 60m)'
        required: false
        default: '60m'
      sim_limit:
        description: 'Optional --sim.limit regex (e.g. .*fork_Cancun.*)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: hive-consume-engine-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  run:
    uses: ./.github/workflows/_hive-sim.yml
    with:
      sim: ethereum/eels/consume-engine
      label: consume-engine
      sim_timelimit: ${{ github.event.inputs.sim_timelimit || '60m' }}
      sim_limit: ${{ github.event.inputs.sim_limit || '' }}
      sim_buildarg: disable_strict_exception_matching=nimbus-el,fukuii
      hive_ref: ${{ github.event.inputs.hive_ref || 'master' }}
