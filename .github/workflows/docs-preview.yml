# Documentation Preview Workflow
#
# This workflow builds and deploys documentation previews for pull requests
# Preview URL will be posted as a comment on the PR
#
# Uses: rossjrw/pr-preview-action for preview deployments

name: Documentation Preview

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/convert_insomnia_to_openapi.py'
      - 'scripts/validate_openapi.py'
      - 'insomnia_workspace.json'
      - '.github/workflows/docs-preview.yml'
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

# Ensure only one preview deployment per PR at a time
concurrency: 
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        if: github.event.action != 'closed'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pip install -r requirements-docs.txt

      - name: Validate OpenAPI spec
        if: github.event.action != 'closed'
        run: python3 scripts/validate_openapi.py

      - name: Build documentation
        if: github.event.action != 'closed'
        run: mkdocs build --strict

      - name: Deploy Preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: ./site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
